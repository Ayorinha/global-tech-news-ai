name: Atualizar Noticias

on:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  fetch:
    name: Coletar Noticias e Publicar
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar pacotes
        run: |
          pip install feedparser requests deep-translator
          echo "Pacotes instalados com sucesso"
          python -c "import feedparser, requests; from deep_translator import GoogleTranslator; print('Imports OK')"

      - name: Executar script
        run: |
          echo "Iniciando coleta..."
          python scripts/fetch_news.py
          echo "Script finalizado"
          echo "Linhas no news.json:"
          wc -l data/news.json
          echo "Primeiros 200 chars do news.json:"
          head -c 200 data/news.json

      - name: Commitar e enviar news.json
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git pull origin main --rebase
          git add data/news.json
          if git diff --staged --quiet; then
            echo "news.json nao mudou, nada para commitar"
          else
            git commit -m "chore: noticias atualizadas $(date -u +'%Y-%m-%d %H:%M')"
            git push origin main
            echo "Push realizado com sucesso!"
          fi
